<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#4A5E3C"/>
      <stop offset="100%" stop-color="#2A3622"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.6"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.88" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="192" height="192" rx="42.24" ry="42.24" fill="url(#bgGrad)"/>

  <!-- Glow halo above book -->
  <ellipse cx="96.0" cy="63.359999999999985" rx="34.56" ry="19.200000000000003"
           fill="#FDE68A" opacity="0.18"/>

  <!-- Light rays -->
  <line x1="74.4" y1="47.0" x2="59.4" y2="38.4"
        stroke="#F5D97A" stroke-width="4.8" stroke-linecap="round" opacity="0.85"/>
  <line x1="83.5" y1="37.9" x2="74.9" y2="22.9"
        stroke="#F5D97A" stroke-width="4.8" stroke-linecap="round" opacity="0.85"/>
  <line x1="96.0" y1="34.6" x2="96.0" y2="17.3"
        stroke="#F5D97A" stroke-width="4.8" stroke-linecap="round" opacity="0.85"/>
  <line x1="108.5" y1="37.9" x2="117.1" y2="22.9"
        stroke="#F5D97A" stroke-width="4.8" stroke-linecap="round" opacity="0.85"/>
  <line x1="117.6" y1="47.0" x2="132.6" y2="38.4"
        stroke="#F5D97A" stroke-width="4.8" stroke-linecap="round" opacity="0.85"/>

  <!-- Book shadow -->
  <rect x="54.7" y="70.1" width="88.3" height="73.0" rx="3.84"
        fill="#1A2415" opacity="0.3"/>

  <!-- Book left page -->
  <rect x="51.8" y="67.2" width="40.3" height="73.0" rx="2.88"
        fill="#EDE8DF"/>

  <!-- Book right page -->
  <rect x="99.8" y="67.2" width="40.3" height="73.0" rx="2.88"
        fill="#EDE8DF" opacity="0.92"/>

  <!-- Page lines left -->
  <line x1="60.7" y1="85.4" x2="88.9" y2="85.4"
        stroke="#C8BFB0" stroke-width="2.3" stroke-linecap="round"/>
  <line x1="60.7" y1="97.8" x2="88.9" y2="97.8"
        stroke="#C8BFB0" stroke-width="2.3" stroke-linecap="round"/>
  <line x1="60.7" y1="110.2" x2="82.8" y2="110.2"
        stroke="#C8BFB0" stroke-width="2.3" stroke-linecap="round"/>
  <line x1="60.7" y1="122.6" x2="88.9" y2="122.6"
        stroke="#C8BFB0" stroke-width="2.3" stroke-linecap="round"/>

  <!-- Page lines right -->
  <line x1="103.1" y1="85.4" x2="131.3" y2="85.4"
        stroke="#C8BFB0" stroke-width="2.3" stroke-linecap="round"/>
  <line x1="103.1" y1="97.8" x2="131.3" y2="97.8"
        stroke="#C8BFB0" stroke-width="2.3" stroke-linecap="round"/>
  <line x1="103.1" y1="110.2" x2="124.3" y2="110.2"
        stroke="#C8BFB0" stroke-width="2.3" stroke-linecap="round"/>
  <line x1="103.1" y1="122.6" x2="131.3" y2="122.6"
        stroke="#C8BFB0" stroke-width="2.3" stroke-linecap="round"/>

  <!-- Spine -->
  <rect x="92.2" y="67.2" width="7.7" height="73.0"
        fill="#C8BFB0" rx="2.304"/>

  <!-- Sun / light gem above book -->
  <circle cx="96.0" cy="63.4" r="12.5"
          fill="url(#glowGrad)" filter="url(#softGlow)"/>
  <circle cx="96.0" cy="63.4" r="7.3"
          fill="#FFFBEB"/>
</svg>