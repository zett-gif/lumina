<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#4A5E3C"/>
      <stop offset="100%" stop-color="#2A3622"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.6"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7.68" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="112.64" ry="112.64" fill="url(#bgGrad)"/>

  <!-- Glow halo above book -->
  <ellipse cx="256.0" cy="168.95999999999998" rx="92.16" ry="51.2"
           fill="#FDE68A" opacity="0.18"/>

  <!-- Light rays -->
  <line x1="198.4" y1="125.4" x2="158.5" y2="102.4"
        stroke="#F5D97A" stroke-width="12.8" stroke-linecap="round" opacity="0.85"/>
  <line x1="222.7" y1="101.1" x2="199.7" y2="61.2"
        stroke="#F5D97A" stroke-width="12.8" stroke-linecap="round" opacity="0.85"/>
  <line x1="256.0" y1="92.2" x2="256.0" y2="46.1"
        stroke="#F5D97A" stroke-width="12.8" stroke-linecap="round" opacity="0.85"/>
  <line x1="289.3" y1="101.1" x2="312.3" y2="61.2"
        stroke="#F5D97A" stroke-width="12.8" stroke-linecap="round" opacity="0.85"/>
  <line x1="313.6" y1="125.4" x2="353.5" y2="102.4"
        stroke="#F5D97A" stroke-width="12.8" stroke-linecap="round" opacity="0.85"/>

  <!-- Book shadow -->
  <rect x="145.9" y="186.9" width="235.5" height="194.6" rx="10.24"
        fill="#1A2415" opacity="0.3"/>

  <!-- Book left page -->
  <rect x="138.2" y="179.2" width="107.5" height="194.6" rx="7.68"
        fill="#EDE8DF"/>

  <!-- Book right page -->
  <rect x="266.2" y="179.2" width="107.5" height="194.6" rx="7.68"
        fill="#EDE8DF" opacity="0.92"/>

  <!-- Page lines left -->
  <line x1="161.8" y1="227.8" x2="237.2" y2="227.8"
        stroke="#C8BFB0" stroke-width="6.1" stroke-linecap="round"/>
  <line x1="161.8" y1="260.9" x2="237.2" y2="260.9"
        stroke="#C8BFB0" stroke-width="6.1" stroke-linecap="round"/>
  <line x1="161.8" y1="294.0" x2="220.7" y2="294.0"
        stroke="#C8BFB0" stroke-width="6.1" stroke-linecap="round"/>
  <line x1="161.8" y1="327.1" x2="237.2" y2="327.1"
        stroke="#C8BFB0" stroke-width="6.1" stroke-linecap="round"/>

  <!-- Page lines right -->
  <line x1="274.8" y1="227.8" x2="350.2" y2="227.8"
        stroke="#C8BFB0" stroke-width="6.1" stroke-linecap="round"/>
  <line x1="274.8" y1="260.9" x2="350.2" y2="260.9"
        stroke="#C8BFB0" stroke-width="6.1" stroke-linecap="round"/>
  <line x1="274.8" y1="294.0" x2="331.4" y2="294.0"
        stroke="#C8BFB0" stroke-width="6.1" stroke-linecap="round"/>
  <line x1="274.8" y1="327.1" x2="350.2" y2="327.1"
        stroke="#C8BFB0" stroke-width="6.1" stroke-linecap="round"/>

  <!-- Spine -->
  <rect x="245.8" y="179.2" width="20.5" height="194.6"
        fill="#C8BFB0" rx="6.144"/>

  <!-- Sun / light gem above book -->
  <circle cx="256.0" cy="169.0" r="33.3"
          fill="url(#glowGrad)" filter="url(#softGlow)"/>
  <circle cx="256.0" cy="169.0" r="19.5"
          fill="#FFFBEB"/>
</svg>