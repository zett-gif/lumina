<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Lumina</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#EDE8DF;--surface:#FAF7F2;--surface2:#F2EDE4;--sep:#DDD6CA;
  --primary:#3A4A30;--primary-dim:rgba(58,74,48,.1);
  --accent:#6B7D5A;
  --t1:#252018;--t2:#6B6555;--t3:#ABA898;
  --radius:12px;--radius-lg:20px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 2px 10px rgba(0,0,0,.05);
  --sh-lg:0 4px 20px rgba(0,0,0,.12),0 8px 32px rgba(0,0,0,.08);
  --cat-biz:#C4601A;--cat-phi:#2C4A6E;--cat-fic:#6B3A8A;--cat-oth:#7A7870;
  --st-want:#4A8C5C;--st-read:#3A6EA8;--st-done:#B87820;--st-tsun:#C04040;
}
html,body{height:100%;background:var(--bg);font-family:'Noto Sans JP',-apple-system,sans-serif;color:var(--t1);font-size:14px;overflow:hidden}
#app{display:flex;flex-direction:column;position:fixed;top:0;left:0;right:0;bottom:0;max-width:430px;margin:0 auto;background:var(--bg)}

/* HEADER */
.app-hdr{background:rgba(250,247,242,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--sep);padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.app-hdr-left{display:flex;flex-direction:column;gap:1px}
.app-hdr h1{font-family:'Inter',sans-serif;font-size:22px;font-weight:800;letter-spacing:-0.8px;color:var(--primary)}
.app-hdr-sub{font-size:9px;font-family:'Inter',sans-serif;letter-spacing:2px;color:var(--t3);text-transform:lowercase}
.hdr-badge{background:var(--primary);color:#FAF7F2;font-family:'Inter',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;min-width:32px;text-align:center;letter-spacing:.3px}

/* MAIN */
.app-main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* NAV */
.app-nav{background:rgba(250,247,242,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--sep);display:flex;padding-bottom:env(safe-area-inset-bottom,0);flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;cursor:pointer;border:none;background:none;color:var(--t3);font-size:10px;font-family:'Noto Sans JP',sans-serif;transition:color .15s}
.nav-btn.active{color:var(--primary)}
.nav-btn svg{width:24px;height:24px}

/* VIEWS */
.view{display:none;padding:14px;min-height:100%}
.view.active{display:block}

/* FILTER BAR */
.filter-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:10px}
.filter-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--sep);background:var(--surface);color:var(--t2);font-size:12px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap}
.chip.on{background:var(--primary);color:#FAF7F2;border-color:var(--primary)}

/* BOOK GRID / SHELF */
.book-grid{display:flex;flex-direction:column;background:none;padding:0}
.shelf-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:16px 4px 0;align-items:flex-end}
.shelf-plank{height:14px;margin:5px 0 22px;background:linear-gradient(to bottom,#D4B896 0%,#B8926A 40%,#9E7850 100%);border-radius:3px 3px 4px 4px;box-shadow:0 5px 14px rgba(90,60,30,.28),0 2px 4px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.25);position:relative;overflow:hidden}
.shelf-plank::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0,transparent 38px,rgba(0,0,0,.04) 38px,rgba(0,0,0,.04) 40px)}

.bcard{background:var(--surface);border-radius:6px 8px 8px 6px;overflow:hidden;cursor:pointer;box-shadow:2px 4px 10px rgba(0,0,0,.18),-1px 0 3px rgba(0,0,0,.08);transition:transform .15s;position:relative}
.bcard:active{transform:scale(.96)}
.bcard-catbar{width:3px;position:absolute;left:0;top:0;bottom:0;border-radius:6px 0 0 6px}
.bcard-img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--surface2)}
.bcard-ph{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;font-size:24px;background:linear-gradient(135deg,#E8E0D4,#D8D0C4)}
.bcard-info{padding:6px 6px 7px 8px}
.bcard-title{font-size:10px;font-weight:500;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px;color:var(--t1)}
.bcard-status{display:inline-block;font-size:8px;padding:2px 5px;border-radius:8px;color:#fff;font-weight:600}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;color:var(--t2)}
.empty-icon{font-size:52px;margin-bottom:14px}
.empty h3{font-size:16px;font-weight:600;color:var(--t1);margin-bottom:6px}
.empty p{font-size:13px}

/* SEARCH VIEW */
.search-wrap{position:relative;margin-bottom:10px}
.search-input{width:100%;padding:12px 46px 12px 16px;border-radius:var(--radius);border:1.5px solid var(--sep);background:var(--surface);font-size:14px;font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color .2s;color:var(--t1)}
.search-input:focus{border-color:var(--primary)}
.search-go{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--t2);display:flex;padding:0}

.act-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.act-btn{padding:12px;border-radius:var(--radius);border:none;cursor:pointer;font-size:13px;font-family:'Noto Sans JP',sans-serif;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px;transition:transform .15s}
.act-btn:active{transform:scale(.97)}
.act-btn.sec{background:var(--surface);color:var(--t1);border:1px solid var(--sep)}
.act-btn.pri{background:var(--primary);color:#FAF7F2}

.result-list{display:flex;flex-direction:column;gap:8px}
.ritem{background:var(--surface);border-radius:var(--radius);padding:12px;display:flex;gap:12px;align-items:center;border:1px solid var(--sep);cursor:pointer;transition:transform .15s}
.ritem:active{transform:scale(.98)}
.ritem-cover{width:50px;height:75px;object-fit:cover;border-radius:7px;background:var(--surface2);flex-shrink:0}
.ritem-ph{width:50px;height:75px;border-radius:7px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}
.ritem-info{flex:1;min-width:0}
.ritem-title{font-size:13px;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px}
.ritem-author{font-size:11px;color:var(--t2);margin-bottom:4px}
.ritem-price{font-size:13px;font-weight:700;color:var(--primary);font-family:'Inter',sans-serif}
.ritem-add{width:34px;height:34px;border-radius:50%;background:var(--primary);border:none;color:#FAF7F2;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}

/* STATS VIEW */
.stat-hero{background:var(--primary);border-radius:var(--radius-lg);padding:24px 20px;margin-bottom:12px;position:relative;overflow:hidden}
.stat-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.05)}
.stat-hero::after{content:'';position:absolute;bottom:-30px;left:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.04)}
.stat-hero-label{font-size:11px;color:rgba(255,255,255,.6);letter-spacing:1px;margin-bottom:8px}
.stat-hero-val{font-size:42px;font-weight:800;font-family:'Inter',sans-serif;color:#fff;line-height:1;letter-spacing:-1px;margin-bottom:4px}
.stat-hero-sub{font-size:12px;color:rgba(255,255,255,.55)}

.stat-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:14px;border:1px solid var(--sep)}
.stat-label{font-size:10px;color:var(--t2);margin-bottom:6px;letter-spacing:.5px}
.stat-val{font-size:24px;font-weight:800;font-family:'Inter',sans-serif;color:var(--primary);line-height:1;margin-bottom:2px}
.stat-unit{font-size:11px;color:var(--t3)}

.chart-sec{background:var(--surface);border-radius:var(--radius-lg);padding:18px;margin-bottom:12px;border:1px solid var(--sep)}
.chart-sec h3{font-size:13px;font-weight:600;margin-bottom:14px;color:var(--t2);letter-spacing:.5px;text-transform:uppercase}
.chart-wrap{position:relative;height:200px}

.amt-table{background:var(--surface);border-radius:var(--radius);overflow:hidden;border:1px solid var(--sep);margin-bottom:12px}
.amt-row{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid var(--sep)}
.amt-row:last-child{border-bottom:none}
.amt-label{font-size:13px;color:var(--t1)}
.amt-right{text-align:right}
.amt-val{font-size:15px;font-weight:700;font-family:'Inter',sans-serif;color:var(--primary)}
.amt-cnt{font-size:10px;color:var(--t3);font-family:'Inter',sans-serif}

/* MODAL OVERLAY */
.modal-ov{position:fixed;inset:0;background:rgba(30,24,16,.5);z-index:100;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.modal-ov.open{display:flex}
.modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:430px;max-height:92dvh;overflow-y:auto;padding:0 18px 40px;animation:slideUp .3s cubic-bezier(.32,.72,0,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--sep);border-radius:2px;margin:10px auto 16px}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-hdr-title{font-size:17px;font-weight:700;color:var(--t1)}
.modal-close{width:30px;height:30px;border-radius:50%;background:var(--surface2);border:1px solid var(--sep);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:16px}

/* BOOK DETAIL */
.detail-hero{display:flex;gap:16px;margin-bottom:18px}
.detail-cover{width:96px;height:144px;object-fit:cover;border-radius:10px;box-shadow:var(--sh-lg);flex-shrink:0;background:var(--surface2)}
.detail-ph{width:96px;height:144px;border-radius:10px;background:linear-gradient(135deg,#f0f0f5,#e4e4ec);display:flex;align-items:center;justify-content:center;font-size:44px;flex-shrink:0}
.detail-meta{flex:1;min-width:0;padding-top:2px}
.detail-title{font-size:16px;font-weight:700;line-height:1.35;margin-bottom:5px}
.detail-author{font-size:12px;color:var(--t2);margin-bottom:8px}
.detail-price{font-size:22px;font-weight:800;font-family:'Inter',sans-serif;color:var(--primary);margin-bottom:8px}
.detail-cat-badge{display:inline-block;font-size:10px;padding:3px 9px;border-radius:10px;font-weight:600;color:#fff}

/* FORM */
.form-grp{margin-bottom:14px}
.form-lbl{font-size:12px;font-weight:500;color:var(--t2);margin-bottom:6px;display:block}
.form-input,.form-ta,.form-sel{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--sep);background:var(--surface);font-size:14px;font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color .2s;color:var(--t1)}
.form-input:focus,.form-ta:focus,.form-sel:focus{border-color:var(--primary)}
.form-ta{resize:none;height:80px}

/* STATUS SELECTOR */
.st-sel{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.st-opt{padding:8px 6px;border-radius:10px;border:2px solid var(--sep);background:var(--surface);cursor:pointer;text-align:center;font-size:12px;font-family:'Noto Sans JP',sans-serif;transition:all .2s}
.st-opt[data-v="want"].on{border-color:var(--st-want);color:var(--st-want);background:rgba(48,209,88,.08)}
.st-opt[data-v="reading"].on{border-color:var(--st-read);color:var(--st-read);background:rgba(0,122,255,.08)}
.st-opt[data-v="read"].on{border-color:var(--st-done);color:var(--st-done);background:rgba(255,149,0,.08)}
.st-opt[data-v="tsundoku"].on{border-color:var(--st-tsun);color:var(--st-tsun);background:rgba(255,69,58,.08)}

/* CATEGORY SELECTOR */
.cat-sel{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.cat-opt{padding:8px 6px;border-radius:10px;border:2px solid var(--sep);background:var(--surface);cursor:pointer;text-align:center;font-size:11px;font-family:'Noto Sans JP',sans-serif;transition:all .2s;line-height:1.4}
.cat-opt[data-v="business"].on{border-color:var(--cat-biz);color:var(--cat-biz);background:rgba(255,107,0,.08)}
.cat-opt[data-v="philosophy"].on{border-color:var(--cat-phi);color:var(--cat-phi);background:rgba(27,58,107,.08)}
.cat-opt[data-v="fiction"].on{border-color:var(--cat-fic);color:var(--cat-fic);background:rgba(107,31,179,.08)}
.cat-opt[data-v="other"].on{border-color:var(--cat-oth);color:var(--cat-oth);background:rgba(142,142,147,.08)}

/* RATING */
.rating-row{display:flex;gap:4px;margin-top:2px}
.star{font-size:26px;cursor:pointer;transition:transform .1s;line-height:1;opacity:.3}
.star.lit{opacity:1}
.star:active{transform:scale(1.2)}

/* BUTTONS */
.btn-save{width:100%;padding:14px;border-radius:var(--radius);border:none;background:var(--primary);color:#FAF7F2;font-size:15px;font-weight:600;font-family:'Noto Sans JP',sans-serif;cursor:pointer;margin-top:8px}
.btn-save:active{opacity:.85}
.btn-del{width:100%;padding:12px;border-radius:var(--radius);border:1px solid rgba(180,60,60,.2);background:rgba(180,60,60,.06);color:#B44040;font-size:14px;font-weight:500;font-family:'Noto Sans JP',sans-serif;cursor:pointer;margin-top:6px}

/* BARCODE MODAL */
.bc-modal{position:fixed;inset:0;background:#000;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center}
.bc-modal.open{display:flex}
.bc-vid-wrap{position:relative;width:100%;max-width:400px}
#bc-video{width:100%;display:block;border-radius:8px}
.bc-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.bc-box{width:80%;height:120px;border:2px solid rgba(255,255,255,.8);border-radius:8px;box-shadow:0 0 0 9999px rgba(0,0,0,.55);position:relative}
.bc-line{position:absolute;top:0;left:0;right:0;height:2px;background:#007AFF;animation:scan 2s ease-in-out infinite}
@keyframes scan{0%{top:0}50%{top:calc(100% - 2px)}100%{top:0}}
.bc-hint{color:rgba(255,255,255,.85);font-size:13px;margin-top:20px;text-align:center;font-family:'Noto Sans JP',sans-serif}
.bc-close{position:absolute;top:20px;right:20px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.bc-status{color:#fff;font-size:12px;margin-top:10px;font-family:'Noto Sans JP',sans-serif;min-height:18px}

/* LOADING / TOAST */
.spinner{width:24px;height:24px;border:2.5px solid var(--sep);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:24px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{text-align:center;color:var(--t2);font-size:13px;padding:8px}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(28,28,30,.9);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-family:'Noto Sans JP',sans-serif;z-index:500;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;backdrop-filter:blur(10px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* SHELF SIZE TOGGLE */
.ssz-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--sep);background:var(--surface);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;padding:0}
.ssz-btn.on{background:var(--primary);color:#FAF7F2;border-color:var(--primary)}

/* DIVIDER / SECTION TITLE */
.divider{height:1px;background:var(--sep);margin:12px 0}
.sec-ttl{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;margin:14px 0 8px}
.sec-ttl:first-child{margin-top:0}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2)}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
</style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <header class="app-hdr">
    <div class="app-hdr-left">
      <h1>Lumina</h1>
    </div>
    <div class="hdr-badge" id="hdr-count">0冊</div>
  </header>

  <!-- MAIN -->
  <main class="app-main">

    <!-- SHELF VIEW -->
    <section id="view-shelf" class="view active">
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <button class="ssz-btn on" data-sz="4" title="4冊/段">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="0" width="7" height="7" rx="1.5"/><rect x="9" y="0" width="7" height="7" rx="1.5"/><rect x="0" y="9" width="7" height="7" rx="1.5"/><rect x="9" y="9" width="7" height="7" rx="1.5"/></svg>
        </button>
        <button class="ssz-btn" data-sz="6" title="6冊/段">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="0" width="4" height="7" rx="1"/><rect x="6" y="0" width="4" height="7" rx="1"/><rect x="12" y="0" width="4" height="7" rx="1"/><rect x="0" y="9" width="4" height="7" rx="1"/><rect x="6" y="9" width="4" height="7" rx="1"/><rect x="12" y="9" width="4" height="7" rx="1"/></svg>
        </button>
      </div>
      <div class="filter-row" id="sf-status"></div>
      <div class="filter-row" id="sf-cat"></div>
      <div id="book-grid" class="book-grid"></div>
    </section>

    <!-- ADD / SEARCH VIEW -->
    <section id="view-add" class="view">
      <div class="search-wrap">
        <input class="search-input" id="search-input" type="text" placeholder="タイトル・著者で検索..." autocomplete="off">
        <button class="search-go" id="search-go">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>
      <div class="act-btns">
        <button class="act-btn sec" id="barcode-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><rect x="2" y="4" width="4" height="16"/><rect x="8" y="4" width="2" height="16"/><rect x="12" y="4" width="4" height="16"/><rect x="18" y="4" width="4" height="16"/></svg>
          バーコード
        </button>
        <button class="act-btn pri" id="manual-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          手動で追加
        </button>
      </div>
      <div id="search-results"></div>
    </section>

    <!-- STATS VIEW -->
    <section id="view-stats" class="view">
      <div class="stat-hero">
        <div class="stat-hero-label">TOTAL READING</div>
        <div class="stat-hero-val" id="amt-total">¥0</div>
        <div class="stat-hero-sub" id="cnt-total">読了 0冊</div>
      </div>
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-label">今月</div>
          <div class="stat-val" id="amt-month">¥0</div>
          <div class="stat-unit" id="cnt-month">0冊</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">今年</div>
          <div class="stat-val" id="amt-year">¥0</div>
          <div class="stat-unit" id="cnt-year">0冊</div>
        </div>
      </div>

      <div class="chart-sec">

const ST = {

const db = {
  books: [],
  load(){ try{ this.books = JSON.parse(localStorage.getItem('myshelf-v2')||'[]') }catch(e){ this.books=[] } },
  save(){ localStorage.setItem('myshelf-v2', JSON.stringify(this.books)) },
  add(b){ this.books.unshift(b); this.save() },
  update(id, u){ const i=this.books.findIndex(b=>b.id===id); if(i>=0){ this.books[i]={...this.books[i],...u}; this.save() } },
  remove(id){ this.books=this.books.filter(b=>b.id!==id); this.save() },
  get(id){ return this.books.find(b=>b.id===id) }
};
db.load();

function uid(){ return Math.random().toString(36).slice(2)+Date.now().toString(36) }

// ===================== STATE =====================

// ===================== SHELF =====================
function renderShelf(){
  // Status filters
  const statuses = [['all','All'],['want','Next'],['reading','Reading'],['read','Done']];
  const sfEl = document.getElementById('sf-status');
  sfEl.innerHTML = statuses.map(([v,l])=>`<button class="chip${sfStatus===v?' on':''}" data-sf-status="${v}">${l}</button>`).join('');
  sfEl.querySelectorAll('.chip').forEach(c=>{
    c.addEventListener('click',()=>{ sfStatus=c.dataset.sfStatus; renderShelf() });
  });

  // Category filters
  const cats = [['all','All'],['business','Business'],['philosophy','Philosophy'],['fiction','Fiction'],['other','Other']];
  const cfEl = document.getElementById('sf-cat');
  cfEl.innerHTML = cats.map(([v,l])=>`<button class="chip${sfCat===v?' on':''}" data-sf-cat="${v}">${l}</button>`).join('');
  cfEl.querySelectorAll('.chip').forEach(c=>{
    c.addEventListener('click',()=>{ sfCat=c.dataset.sfCat; renderShelf() });
  });

  let books = db.books;
  if(sfStatus!=='all') books = books.filter(b=>b.status===sfStatus);
  if(sfCat!=='all') books = books.filter(b=>b.category===sfCat);

  const grid = document.getElementById('book-grid');
  document.getElementById('hdr-count').textContent = db.books.length+'冊';

  if(!books.length){
    grid.innerHTML = `<div class="empty">
      <div class="empty-icon">${db.books.length?'🔍':'📚'}</div>
      <h3>${db.books.length?'本が見つかりません':'まだ本がありません'}</h3>
      <p>${db.books.length?'条件を変更してみてください':'「追加」から本を登録しましょう'}</p>
    </div>`;
    return;
  }

  const SHELF_SIZE = shelfSize;
  const offsets = [10, 3, 14, 6, 8, 12];
  const rows = [];
  for(let i=0; i<books.length; i+=SHELF_SIZE) rows.push(books.slice(i,i+SHELF_SIZE));

  grid.innerHTML = rows.map(row=>{
    const booksHtml = row.map((b,i)=>{
      const cat = CAT[b.category||'other'];
      const st = ST[b.status||'want'];
      const cover = b.cover
        ? `<img class="bcard-img" src="${b.cover}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`+
          `<div class="bcard-ph" style="display:none">📖</div>`
        : `<div class="bcard-ph">📖</div>`;
      return `<div class="bcard" data-id="${b.id}" style="margin-top:${offsets[i%6]}px">
        <div class="bcard-catbar" style="background:${cat.color}"></div>
        ${cover}
      </div>`;
    }).join('');
    return `<div class="shelf-row" style="grid-template-columns:repeat(${SHELF_SIZE},1fr)">${booksHtml}</div><div class="shelf-plank"></div>`;
  }).join('');

  grid.querySelectorAll('.bcard').forEach(c=>{
    c.addEventListener('click',()=>openDetail(c.dataset.id));
  });
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

// ===================== SEARCH =====================
document.getElementById('search-go').addEventListener('click', doSearch);
document.getElementById('search-input').addEventListener('keydown', e=>{ if(e.key==='Enter') doSearch() });

async function doSearch(){
  const q = document.getElementById('search-input').value.trim();
  if(!q) return;
  const res = document.getElementById('search-results');
  res.innerHTML = '<div class="spinner"></div><div class="loading-txt">検索中...</div>';
  try {
    const [gbItems, ndlItems] = await Promise.allSettled([
      searchGoogleBooks(q),
      searchNDL(q)
    ]);
    const gb = gbItems.status==='fulfilled' ? gbItems.value : [];
    const ndl = ndlItems.status==='fulfilled' ? ndlItems.value : [];
    const merged = mergeResults(gb, ndl);
    renderSearchResults(merged);
  } catch(e) {
    res.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>検索に失敗しました</p></div>`;
  }
}

async function searchGoogleBooks(q){
  const url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&maxResults=40&country=JP&printType=books`;
  const r = await fetch(url);
  const data = await r.json();
  return data.items||[];
}

async function searchNDL(q){
  const url = `https://iss.ndl.go.jp/api/opensearch?any=${encodeURIComponent(q)}&mediatype=1&cnt=20`;
  const r = await fetch(url);
  const text = await r.text();
  const xml = new DOMParser().parseFromString(text, 'text/xml');
  const items = Array.from(xml.querySelectorAll('item'));
  return items.map(item => {
    const get = tag => item.querySelector(tag)?.textContent?.trim()||'';
    const isbns = Array.from(item.querySelectorAll('identifier'))
      .map(el=>el.textContent.trim())
      .filter(s=>s.replace(/-/g,'').match(/^97[89]\d{10}$/));
    const isbn = isbns[0]?.replace(/-/g,'')||'';
    return {
      _source: 'ndl',
      volumeInfo: {
        title: get('title').replace(/\s*\/.*$/,'').trim(),
        authors: get('author') ? [get('author')] : [],
        industryIdentifiers: isbn ? [{type:'ISBN_13', identifier:isbn}] : [],
        imageLinks: isbn ? { thumbnail: `https://cover.openbd.jp/${isbn}.jpg` } : {}
      },
      saleInfo: {}
    };
  }).filter(x=>x.volumeInfo.title);
}

function mergeResults(gb, ndl){
  // Google Books を優先。NDLはISBNで重複排除して追加
  const gbIsbns = new Set(gb.map(x=>{
    const ids = x.volumeInfo?.industryIdentifiers||[];
    return (ids.find(i=>i.type==='ISBN_13')||ids[0])?.identifier||'';
  }).filter(Boolean));

  const gbTitles = new Set(gb.map(x=>(x.volumeInfo?.title||'').slice(0,10)));

  const ndlUniq = ndl.filter(x=>{
    const isbn = x.volumeInfo?.industryIdentifiers?.[0]?.identifier||'';
    const title = (x.volumeInfo?.title||'').slice(0,10);
    if(isbn && gbIsbns.has(isbn)) return false;
    if(gbTitles.has(title)) return false;
    return true;
  });

  return [...gb, ...ndlUniq].slice(0,40);
}

async function fetchOpenBDPrice(isbn){
  if(!isbn) return null;
  try {
    const r = await fetch(`https://api.openbd.jp/v1/get?isbn=${isbn}`);
    const data = await r.json();
    if(!data[0]) return null;
    // summary.price
    const p = data[0].summary?.price;
    if(p && parseInt(p) > 0) return parseInt(p);
    // onix
    const prices = data[0].onix?.ProductSupply?.SupplyDetail?.Price;
    if(prices?.length) return parseInt(prices[0].PriceAmount)||null;
    return null;
  } catch(e){ return null }
}

async function searchByISBN(isbn){
  try {
    const [gbRes, obRes] = await Promise.allSettled([
      fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}&country=JP`).then(r=>r.json()),
      fetch(`https://api.openbd.jp/v1/get?isbn=${isbn}`).then(r=>r.json())
    ]);
    const gbItem = gbRes.status==='fulfilled' ? (gbRes.value.items||[])[0]||null : null;
    const obData = obRes.status==='fulfilled' ? obRes.value?.[0] : null;
    if(!gbItem && !obData) return null;
    // OpenBDで価格・表紙を補完
    if(gbItem && obData){
      const obPrice = parseInt(obData.summary?.price||obData.onix?.ProductSupply?.SupplyDetail?.Price?.[0]?.PriceAmount||0);
      if(obPrice && !gbItem.saleInfo?.listPrice) {
        gbItem.saleInfo = gbItem.saleInfo||{};
        gbItem.saleInfo.listPrice = { amount: obPrice };
      }
      if(!gbItem.volumeInfo?.imageLinks?.thumbnail && obData.summary?.cover){
        gbItem.volumeInfo.imageLinks = { thumbnail: obData.summary.cover };
      }
      return gbItem;
    }
    if(gbItem) return gbItem;
    // Google Booksになければ OpenBDから組み立て
    const s = obData.summary||{};
    return {
      _source:'openbd',
      volumeInfo:{
        title: s.title||'不明',
        authors: s.author ? [s.author] : [],
        industryIdentifiers:[{type:'ISBN_13',identifier:isbn}],
        imageLinks: s.cover ? {thumbnail:s.cover} : {}
      },
      saleInfo:{ listPrice:{ amount: parseInt(s.price)||0 } }
    };
  } catch(e){ return null }
}

function renderSearchResults(items){
  const res = document.getElementById('search-results');
  if(!items.length){
    res.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><h3>見つかりませんでした</h3><p>別のキーワードで検索してみてください</p></div>`;
    return;
  }
  res.innerHTML = `<div class="result-list">${items.map((item,i)=>{
    const v = item.volumeInfo||{};
    const price = item.saleInfo?.listPrice?.amount || '';
    const cover = (v.imageLinks?.thumbnail||'').replace('http://','https://');
    const coverEl = cover
      ? `<img class="ritem-cover" src="${cover}" alt="" onerror="this.outerHTML='<div class=\\'ritem-ph\\'>📖</div>'">`
      : `<div class="ritem-ph">📖</div>`;
    return `<div class="ritem" data-idx="${i}">
      ${coverEl}
      <div class="ritem-info">
        <div class="ritem-title">${esc(v.title||'不明')}</div>
        <div class="ritem-author">${esc((v.authors||[]).join(', ')||'')}</div>
        <div class="ritem-price">${price?'¥'+Number(price).toLocaleString():'価格不明'}</div>
      </div>
      <button class="ritem-add" data-idx="${i}">+</button>
    </div>`;
  }).join('')}</div>`;

  res.querySelectorAll('.ritem-add').forEach(btn=>{
    btn.addEventListener('click', e=>{ e.stopPropagation(); openConfirmModal(items[+btn.dataset.idx]) });
  });
  res.querySelectorAll('.ritem').forEach(row=>{
    row.addEventListener('click',()=> openConfirmModal(items[+row.dataset.idx]));
  });
}

// ===================== CONFIRM ADD MODAL =====================
async function openConfirmModal(item){
  pendingBook = item;
  const v = item.volumeInfo||{};
  const apiPrice = item.saleInfo?.listPrice?.amount || 0;
  const cover = (v.imageLinks?.thumbnail||'').replace('http://','https://');
  const isbn = (v.industryIdentifiers||[]).find(x=>x.type==='ISBN_13')?.identifier||'';

  const cw = document.getElementById('confirm-cover-wrap');
  cw.innerHTML = cover
    ? `<img class="detail-cover" src="${cover}" alt="" onerror="this.outerHTML='<div class=\\'detail-ph\\'>📖</div>'">`
    : `<div class="detail-ph">📖</div>`;

  document.getElementById('confirm-title').textContent = v.title||'不明';
  document.getElementById('confirm-author').textContent = (v.authors||[]).join(', ')||'著者不明';
  document.getElementById('c-price').value = apiPrice||'';

  const priceEl = document.getElementById('confirm-price');
  if(apiPrice){
    priceEl.textContent = `¥${Number(apiPrice).toLocaleString()}`;
  } else if(isbn){
    priceEl.textContent = '価格取得中...';
    const obPrice = await fetchOpenBDPrice(isbn);
    if(obPrice){
      priceEl.textContent = `¥${obPrice.toLocaleString()}`;
      document.getElementById('c-price').value = obPrice;
    } else {
      priceEl.textContent = '価格不明';
    }
  } else {
    priceEl.textContent = '価格不明';
  }

  resetSelectors('#c-status-sel','want');
  resetSelectors('#c-cat-sel','business');
  openModal('modal-confirm');
}

document.getElementById('confirm-close').addEventListener('click',()=>closeModal('modal-confirm'));
document.getElementById('modal-confirm').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal('modal-confirm') });

document.querySelectorAll('#c-status-sel .st-opt').forEach(o=>{
  o.addEventListener('click',()=>{ document.querySelectorAll('#c-status-sel .st-opt').forEach(x=>x.classList.remove('on')); o.classList.add('on') });
});
document.querySelectorAll('#c-cat-sel .cat-opt').forEach(o=>{
  o.addEventListener('click',()=>{ document.querySelectorAll('#c-cat-sel .cat-opt').forEach(x=>x.classList.remove('on')); o.classList.add('on') });
});

document.getElementById('confirm-add').addEventListener('click',()=>{
  if(!pendingBook) return;
  const v = pendingBook.volumeInfo||{};
  const apiPrice = pendingBook.saleInfo?.listPrice?.amount||0;
  const manualPrice = parseInt(document.getElementById('c-price').value)||0;
  const cover = (v.imageLinks?.thumbnail||'').replace('http://','https://');
  const book = {
    id: uid(),
    title: v.title||'不明',
    author: (v.authors||[]).join(', ')||'',
    price: manualPrice||apiPrice||0,
    cover,
    isbn: (v.industryIdentifiers||[]).find(x=>x.type==='ISBN_13')?.identifier||'',
    status: document.querySelector('#c-status-sel .st-opt.on')?.dataset.v||'want',
    category: document.querySelector('#c-cat-sel .cat-opt.on')?.dataset.v||'other',
    memo:'', rating:0, addedDate: new Date().toISOString().slice(0,10), finishDate:''
  };
  db.add(book);
  closeModal('modal-confirm');
  renderShelf();
  toast('追加しました 📚');
  pendingBook = null;
});

// ===================== BARCODE =====================
document.getElementById('barcode-btn').addEventListener('click', startBarcode);
document.getElementById('bc-close').addEventListener('click', stopBarcode);

function startBarcode(){
  if(!window.ZXing){ toast('バーコードライブラリ読み込み中...'); return }
  if(codeReader) stopBarcode();
  const modal = document.getElementById('modal-bc');
  modal.classList.add('open');
  document.getElementById('bc-status').textContent = 'カメラを起動中...';

  try {
    codeReader = new ZXing.BrowserMultiFormatReader();
    codeReader.decodeFromVideoDevice(null, 'bc-video', async (result, err)=>{
      if(result){
        const code = result.getText();
        document.getElementById('bc-status').textContent = '読み取り中: '+code;
        stopBarcode();
        const item = await searchByISBN(code);
        if(item){
          // Switch to add view and show confirm
          document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
          document.querySelector('.nav-btn[data-view="add"]').classList.add('active');
          document.querySelectorAll('.view').forEach(s=>s.classList.remove('active'));
          document.getElementById('view-add').classList.add('active');
          openConfirmModal(item);
        } else {
          toast('本の情報が見つかりませんでした');
          // Open manual with ISBN pre-fill
          document.getElementById('m-title').value = '';
          openModal('modal-manual');
        }
      }
    });
  } catch(e) {
    toast('カメラにアクセスできませんでした');
    stopBarcode();
  }
}

function stopBarcode(){
  try{ if(codeReader){ codeReader.reset(); codeReader=null } }catch(e){}
  document.getElementById('modal-bc').classList.remove('open');
}

// ===================== STATS =====================
function renderStats(){
  const now = new Date();
  const curYear = now.getFullYear();
  const curMonth = now.getMonth()+1;

  const readBooks = db.books.filter(b=>b.status==='read');

  function getDate(b){ return b.finishDate||b.addedDate||'' }

  const thisMonthBooks = readBooks.filter(b=>{
    const d = getDate(b); if(!d) return false;
    const dd = new Date(d);
    return dd.getFullYear()===curYear && dd.getMonth()+1===curMonth;
  });
  const thisYearBooks = readBooks.filter(b=>{
    const d = getDate(b); if(!d) return false;
    return new Date(d).getFullYear()===curYear;
  });

  const fmt = n => n>=10000 ? (n/10000).toFixed(1)+'万' : n.toLocaleString();
  const sumPrice = arr => arr.reduce((s,b)=>s+(b.price||0),0);

  document.getElementById('amt-month').textContent = '¥'+fmt(sumPrice(thisMonthBooks));
  document.getElementById('cnt-month').textContent = thisMonthBooks.length+'冊';
  document.getElementById('amt-year').textContent = '¥'+fmt(sumPrice(thisYearBooks));
  document.getElementById('cnt-year').textContent = thisYearBooks.length+'冊';
  document.getElementById('amt-total').textContent = '¥'+sumPrice(readBooks).toLocaleString();
  document.getElementById('cnt-total').textContent = '読了 '+readBooks.length+'冊';

  // Monthly chart – last 12 months
  const months = [];
  for(let i=11;i>=0;i--){
    const d = new Date(curYear, curMonth-1-i, 1);
    months.push({ y:d.getFullYear(), m:d.getMonth()+1, label:`${d.getMonth()+1}月` });
  }
  const monthlyCounts = months.map(({y,m})=>
    readBooks.filter(b=>{ const d=getDate(b); if(!d)return false; const dd=new Date(d); return dd.getFullYear()===y&&dd.getMonth()+1===m }).length
  );

  if(monthChart){ monthChart.destroy(); monthChart=null }
  const mctx = document.getElementById('chart-monthly').getContext('2d');
  monthChart = new Chart(mctx, {
    type:'bar',
    data:{
      labels: months.map(x=>x.label),
      datasets:[{ data:monthlyCounts, backgroundColor:'rgba(58,74,48,.7)', borderRadius:6, borderSkipped:false }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        y:{ beginAtZero:true, ticks:{ stepSize:1, font:{size:10} }, grid:{color:'rgba(0,0,0,.05)'} },
        x:{ ticks:{ font:{size:10} }, grid:{display:false} }
      }
    }
  });

  // Category chart
  const catCounts = Object.keys(CAT).map(k=>({ key:k, count:db.books.filter(b=>b.category===k).length }));
  const total = catCounts.reduce((s,x)=>s+x.count,0);

  if(catChart){ catChart.destroy(); catChart=null }
  const cctx = document.getElementById('chart-cat').getContext('2d');
  catChart = new Chart(cctx, {
    type:'doughnut',
    data:{
      labels: catCounts.map(x=>CAT[x.key].label),
      datasets:[{ data:catCounts.map(x=>x.count||0), backgroundColor:catCounts.map(x=>CAT[x.key].color), borderWidth:2, borderColor:'#fff' }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      cutout:'65%',
      plugins:{
        legend:{display:false},
        tooltip:{ callbacks:{ label: ctx=>`${ctx.label}: ${ctx.parsed}冊 (${total?Math.round(ctx.parsed/total*100):0}%)` } }
      }
    }
  });

  document.getElementById('cat-legend').innerHTML = catCounts.map(x=>`
    <div class="legend-item">
      <div class="legend-dot" style="background:${CAT[x.key].color}"></div>
      ${CAT[x.key].short}: ${x.count}冊
    </div>`).join('');

  // Status table
  const tbl = document.getElementById('status-table');
  tbl.innerHTML = Object.entries(ST).map(([k,v])=>{
    const arr = db.books.filter(b=>b.status===k);
    const s = sumPrice(arr);
    return `<div class="amt-row">
      <div class="amt-label"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${v.color};margin-right:6px;vertical-align:middle"></span>${v.label}</div>
      <div class="amt-right">
        <div class="amt-val">¥${s.toLocaleString()}</div>
        <div class="amt-cnt">${arr.length}冊</div>
      </div>
    </div>`;
  }).join('');
}

// ===================== MODAL UTILS =====================
function openModal(id){ document.getElementById(id).classList.add('open'); document.body.style.overflow='hidden' }
function closeModal(id){ document.getElementById(id).classList.remove('open'); document.body.style.overflow='' }

function resetSelectors(sel, defaultVal){
  document.querySelectorAll(sel+' [data-v]').forEach(o=>{
    o.classList.toggle('on', o.dataset.v===defaultVal);
  });
}

// ===================== SHELF SIZE TOGGLE =====================
document.querySelectorAll('.ssz-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    shelfSize = +btn.dataset.sz;
    document.querySelectorAll('.ssz-btn').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    renderShelf();
  });
});

// ===================== INIT =====================
renderShelf();
